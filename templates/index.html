<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Gen Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5; /* Indigo */
            --primary-hover: #4338ca;
            --bg-body: #f3f4f6;
            --bg-panel: #ffffff;
            --text-main: #111827;
            --text-sub: #6b7280;
            --border: #e5e7eb;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body {
            background-color: var(--bg-body);
            height: 100vh;
            display: flex;
            color: var(--text-main);
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px;
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .brand {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .settings-group {
            margin-top: 20px;
        }
        
        label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-sub);
            margin-bottom: 8px;
            font-weight: 500;
        }

        select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.9rem;
            background-color: #fff;
            color: var(--text-main);
            outline: none;
        }

        .new-chat-btn {
            margin-top: auto;
            background: white;
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-main);
            font-weight: 500;
            transition: 0.2s;
        }
        .new-chat-btn:hover { background: #f9fafb; border-color: #d1d5db; }

        /* --- MAIN CHAT AREA --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        .message-row {
            display: flex;
            gap: 15px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }
        .av-bot { background: var(--primary); color: white; }
        .av-user { background: #e5e7eb; color: #374151; }

        .message-content {
            flex: 1;
            line-height: 1.6;
            font-size: 0.95rem;
        }
        
        .message-content strong { color: #111827; font-weight: 600; }

        /* Copy Button */
        .copy-btn {
            display: inline-block;
            margin-top: 10px;
            font-size: 0.75rem;
            color: var(--text-sub);
            cursor: pointer;
            border: 1px solid var(--border);
            padding: 4px 8px;
            border-radius: 4px;
            background: white;
        }
        .copy-btn:hover { border-color: var(--primary); color: var(--primary); }

        /* --- INPUT AREA --- */
        .input-wrapper {
            background: var(--bg-panel);
            border-top: 1px solid var(--border);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .input-container {
            width: 100%;
            max-width: 800px;
            position: relative;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            transition: 0.2s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }

        .send-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .send-btn:hover { background: var(--primary-hover); }

    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">
            <span>⚡</span> TemplateGen
        </div>

        <div class="settings-group">
            <label>Template Tone</label>
            <select id="tone-select">
                <option value="Professional">👔 Professional</option>
                <option value="Friendly">😊 Friendly / Casual</option>
                <option value="Urgent">🔥 Urgent / FOMO</option>
                <option value="Persuasive">✨ Persuasive</option>
            </select>
        </div>

        <div style="font-size: 0.8rem; color: #9ca3af; margin-top: 10px;">
            Select a tone and ask for a template.
        </div>

        <button class="new-chat-btn" onclick="clearChat()">+ New Chat</button>
    </div>

    <div class="main-content">
        <div id="chat-box">
            <div class="message-row">
                <div class="avatar av-bot">AI</div>
                <div class="message-content">
                    <strong>System</strong><br>
                    Hello! I am your professional template assistant. Select a tone from the sidebar and describe what you need.
                </div>
            </div>
        </div>

        <div class="input-wrapper">
            <div class="input-container">
                <input type="text" id="user-input" placeholder="e.g. Discount message for Diwali..." onkeypress="handleEnter(event)">
                <button class="send-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        let chatHistory = [];

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const box = document.getElementById('chat-box');
            const tone = document.getElementById('tone-select').value;
            const text = input.value.trim();
            
            if (!text) return;

            // 1. Add User Message
            addMessage('User', text, 'av-user');
            input.value = '';

            // 2. Add Loading State
            const loadingId = addMessage('AI', 'Writing...', 'av-bot', true);

            // 3. Update History & Send
            chatHistory.push({ role: "user", parts: [{ text: text }] });

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: text,
                        history: chatHistory,
                        tone: tone // Sending the selected tone!
                    })
                });
                
                const data = await response.json();
                
                // Remove Loading Text
                document.getElementById(loadingId).remove();

                // Format and Add AI Message
                let cleanText = data.response.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                cleanText = cleanText.replace(/\n/g, '<br>');
                
                addMessage('AI', cleanText, 'av-bot', false, true); // True enables Copy button

                chatHistory.push({ role: "model", parts: [{ text: data.response }] });

            } catch (error) {
                document.getElementById(loadingId).innerText = "Error connecting to server.";
            }
        }

        function addMessage(name, text, avatarClass, isLoading = false, showCopy = false) {
            const box = document.getElementById('chat-box');
            const row = document.createElement('div');
            row.className = 'message-row';
            row.id = isLoading ? 'loading-row' : '';

            let copyHtml = showCopy ? `<div class="copy-btn" onclick="copyText(this)">📋 Copy Text</div>` : '';

            row.innerHTML = `
                <div class="avatar ${avatarClass}">${name === 'AI' ? 'AI' : 'You'}</div>
                <div class="message-content">
                    <strong>${name}</strong><br>
                    <span class="text-body">${text}</span>
                    ${copyHtml}
                </div>
            `;
            box.appendChild(row);
            box.scrollTop = box.scrollHeight;
            return row.id;
        }

        function copyText(btn) {
            const textBody = btn.parentElement.querySelector('.text-body').innerText;
            navigator.clipboard.writeText(textBody);
            btn.innerText = "✅ Copied!";
            setTimeout(() => btn.innerText = "📋 Copy Text", 2000);
        }

        function handleEnter(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function clearChat() {
            location.reload(); // Simple refresh to clear state
        }
    </script>
</body>
</html>
