<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant</title>
    <style>
        /* 1. RESET & BASIC SETUP */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #e5ddd5; display: flex; flex-direction: column; height: 100vh; }

        /* 2. HEADER */
        header {
            background-color: #075e54;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 10;
        }
        h1 { font-size: 1.2rem; font-weight: 600; }
        
        .clear-btn {
            background: transparent;
            border: 1px solid white;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .clear-btn:hover { background: rgba(255,255,255,0.2); }

        /* 3. CHAT AREA */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-blend-mode: soft-light;
        }

        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 10px;
            line-height: 1.5;
            position: relative;
            font-size: 0.95rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        
        .user-message {
            align-self: flex-end;
            background-color: #dcf8c6;
            color: #333;
            border-top-right-radius: 0;
        }

        .bot-message {
            align-self: flex-start;
            background-color: white;
            color: #333;
            border-top-left-radius: 0;
        }
        
        .bot-message strong { color: #075e54; }

        /* 4. INPUT AREA */
        .input-area {
            padding: 15px;
            background: #f0f0f0;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        input {
            flex: 1;
            padding: 12px 15px;
            border-radius: 25px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 1rem;
        }
        button {
            background-color: #075e54;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        button:hover { background-color: #128c7e; }
    </style>
</head>
<body>

    <header>
        <h1>🤖 Smart Assistant</h1>
        <button class="clear-btn" onclick="clearChat()">New Chat 🗑️</button>
    </header>

    <div id="chat-container">
        <div class="message bot-message">
            Hi! 👋 I'm ready to help. Ask me for a template or just chat!
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type a message..." onkeypress="handleEnter(event)">
        <button onclick="sendMessage()">➤</button>
    </div>

    <script>
        let chatHistory = [];

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const container = document.getElementById('chat-container');
            const text = input.value.trim();
            
            if (!text) return;

            // 1. Show user message immediately
            appendMessage(text, 'user-message');
            input.value = '';

            // 2. Show "Typing..."
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message bot-message';
            loadingDiv.innerText = 'Typing...';
            loadingDiv.id = 'loading';
            container.appendChild(loadingDiv);
            container.scrollTop = container.scrollHeight;

            try {
                // --- THE FIX IS HERE ---
                // We send the OLD history + the NEW message separately.
                // We do NOT add the new message to 'chatHistory' yet.
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: text,
                        history: chatHistory 
                    })
                });
                
                const data = await response.json();
                
                // Remove loading
                container.removeChild(loadingDiv);
                
                // Show AI response
                let cleanText = data.response.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                cleanText = cleanText.replace(/\n/g, '<br>');
                appendMessage(cleanText, 'bot-message', true);

                // 3. NOW we update the history with both messages for next time
                chatHistory.push({ role: "user", parts: [{ text: text }] });
                chatHistory.push({ role: "model", parts: [{ text: data.response }] });

            } catch (error) {
                loadingDiv.innerText = "Error: Connection failed. Try clicking 'New Chat'.";
                console.error(error);
            }
        }

        function appendMessage(text, className, isHtml = false) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = `message ${className}`;
            if (isHtml) {
                div.innerHTML = text;
            } else {
                div.innerText = text;
            }
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function handleEnter(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function clearChat() {
            const container = document.getElementById('chat-container');
            container.innerHTML = `<div class="message bot-message">Chat cleared! 🧹</div>`;
            chatHistory = []; // Wipe memory
        }
    </script>
</body>
</html>
